# Don't print a new line at the start of the prompt
add_newline = false

# Make prompt a single line instead of two lines
[line_break]
disabled = false

format = "${custom.sbruf_prompt} $all${custom.git_branch} "

[username]
style_user = "white bold"
style_root = "red bold"
format = "[$user]($style)"
disabled = false
show_always = false

[hostname]
ssh_only = false
format =  "@[$hostname](bold red) "
trim_at = ".companyname.com"
disabled = false

[directory]
truncation_length = 3
truncation_symbol = "…/"

[cmd_duration]
disabled = true

[python]
disabled = true

# Built-in git_branch disabled — see [custom.git_branch] below
# [git_branch]
# truncation_length = 10
# truncation_symbol = "⁖"
# symbol = ""
# style = "bold purple"
# format = "[$symbol$branch]($style)"

[git_branch]
disabled = true

# Custom git branch: strips "mattiab/" prefix to "m/", truncates to 10 chars
[custom.git_branch]
command = 'b=$(git branch --show-current 2>/dev/null); b=${b/#mattiab\//m/}; [ ${#b} -gt 10 ] && b="${b:0:9}⁖"; echo "$b"'
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
style = "bold purple"
format = "[$output]($style)"

[custom.sbruf_prompt]
command = "sbruf prompt --env-only 2>&1"
# the following does not work for unknown reasons. Use test below
# when = true
when = "test 1"
style = "fg:cyan"
# symbol = "∳"
